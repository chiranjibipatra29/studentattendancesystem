<!doctype html>
<html>
  <head>
    <title>Attendance System</title>

    <style>
      body {
        font-family: Arial;
        background: linear-gradient(to right, #4facfe, #00f2fe);
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
      }

      .container {
        background: white;
        padding: 25px;
        border-radius: 10px;
        width: 90%;
        max-width: 400px;
        box-shadow: 0 0 10px rgba(0, 0, 0, 0.2);
      }

      h2 {
        text-align: center;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin-top: 5px;
        margin-bottom: 15px;
        border-radius: 5px;
        border: 1px solid #ccc;
      }

      input[type="submit"] {
        background: #4facfe;
        color: white;
        border: none;
        cursor: pointer;
      }

      input[type="submit"]:hover {
        background: #00c6ff;
      }

      a {
        display: block;
        text-align: center;
        margin-top: 10px;
        text-decoration: none;
        color: #333;
      }

      @media (max-width: 500px) {
        .container {
          padding: 15px;
        }
      }
    </style>
  </head>

  <body>
    <div class="container">
      <h2>Student Attendance</h2>

      <form action="save.php" method="post">
        Student Name:
        <input type="text" name="student_name" required />

        Date:
        <input type="date" name="date" required />

        Status:
        <select name="status">
          <option value="Present">Present</option>
          <option value="Absent">Absent</option>
        </select>

        <input type="submit" value="Save Attendance" />
      </form>

      <a href="view.php">View Attendance</a>
    </div>
  </body>
</html>
